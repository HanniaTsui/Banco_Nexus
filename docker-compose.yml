version: '3.8'

services:
  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["mongod", "--replSet", "rsBanco", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db
    networks:
      - mongo-net

  mongo2:
    image: mongo:7
    container_name: mongo2
    command: ["mongod", "--replSet", "rsBanco", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo2-data:/data/db
    networks:
      - mongo-net

  mongo3:
    image: mongo:7
    container_name: mongo3
    command: ["mongod", "--replSet", "rsBanco", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    volumes:
      - mongo3-data:/data/db
    networks:
      - mongo-net

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:

networks:
  mongo-net:
    driver: bridge
